<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Institutional Analytics?Personal Bloomberg</title>
<style>
:root{--bg:#0b0f17;--panel:#111827;--panel2:#172033;--line:#2a354c;--text:#e8edf7;--muted:#94a3b8;--red:#f87171;--yellow:#fbbf24;--green:#34d399;--blue:#60a5fa}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#080b11,#111827 45%,#0b1220);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}header{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px;align-items:center;background:rgba(8,11,17,.78);position:sticky;top:0;backdrop-filter:blur(14px)}h1{font-size:1.1rem;margin:0}.sub{color:var(--muted);font-size:.82rem}a{color:var(--blue);text-decoration:none}.wrap{max-width:1180px;margin:0 auto;padding:18px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.card{grid-column:span 6;background:rgba(17,24,39,.88);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 18px 42px rgba(0,0,0,.22)}.card.full{grid-column:span 12}.kpi{grid-column:span 3}.label{color:var(--muted);font-size:.74rem;text-transform:uppercase;letter-spacing:.08em}.num{font-size:2rem;font-weight:850;letter-spacing:-.04em;margin:.25rem 0}.read{color:var(--muted);font-size:.9rem;line-height:1.45}.high{color:var(--red)}.medium{color:var(--yellow)}.low,.opportunity{color:var(--green)}.neutral{color:var(--blue)}table{width:100%;border-collapse:collapse;font-size:.86rem}th,td{padding:9px;border-bottom:1px solid var(--line);text-align:left}th{color:var(--muted);font-size:.72rem;text-transform:uppercase}.bar{height:10px;border-radius:999px;background:#263246;overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--red),var(--yellow),var(--green));width:50%}@media(max-width:760px){.card,.kpi{grid-column:span 12}header{display:block}.num{font-size:1.55rem}}
</style>
</head>
<body>
<header><div><h1>Institutional Analytics?Personal Bloomberg</h1><div class="sub">Attribution ? Sensitivity ? Risk stack ? Data confidence</div></div><div class="sub"><a href="index.html">首頁</a>?<a href="dashboard.html">Dashboard</a>?<a href="daily-extensions.html">每日延伸</a></div></header>
<main class="wrap">
  <div class="grid" id="top"></div>
  <div class="grid" style="margin-top:14px">
    <section class="card"><h2>邏輯稽核</h2><table id="logic"></table></section>
    <section class="card"><h2>報酬與訊號歸因</h2><table id="drivers"></table></section>
    <section class="card"><h2>比特幣價格壓力測試</h2><table id="sensitivity"></table></section>
    <section class="card"><h2>目前禁止動作</h2><table id="blocked"></table></section>
    <section class="card full"><h2>風險堆疊</h2><table id="risk"></table></section>
    <section class="card full"><h2>門檻與反證條件</h2><table id="thresholds"></table></section>
  </div>
</main>
<script>
const pct=v=>v==null?'?':(Number(v)*100).toFixed(2)+'%';
const num=(v,d=2)=>v==null?'?':Number(v).toFixed(d);
const cls=s=>s==='consistent'||s==='pass'?'low':(s==='blocked'||s==='fail'?'high':'medium');
const actionLabel=a=>({add_2_5x_mstr:'禁止小倉 2.5x 加碼',auto_trade:'禁止自動交易級結論',claim_common_equity_cheap:'禁止宣稱普通股便宜',mnav_green_light:'禁止估值綠燈',treat_mnav_as_green:'禁止把估值倍率當綠燈',use_etf_flow_as_hard_trigger:'禁止用 ETF flow 當硬觸發'})[a]||a;
async function load(){
 const a=await fetch('data/daily/institutional_analytics.json',{cache:'no-store'}).then(r=>r.json());
 const logic=await fetch('data/daily/logic_audit.json',{cache:'no-store'}).then(r=>r.ok?r.json():null).catch(()=>null);
 const audit=a.logic_audit||{};
 document.getElementById('top').innerHTML=`
 <div class="card full"><div class="label">今日總結 ? ${a.date}</div><div class="num">${a.executive_read.headline}</div><div class="read">${a.executive_read.one_line}</div></div>
 <div class="card kpi"><div class="label">邏輯稽核</div><div class="num ${cls(audit.status)}">${audit.status||'not_run'}</div><div class="read">${audit.plain_english||'等待每日稽核'}</div></div>
 <div class="card kpi"><div class="label">資料信心</div><div class="num ${a.quality.confidence.includes('low')?'medium':'low'}">${a.quality.confidence}</div><div class="read">${a.quality.verification_status}</div></div>
 <div class="card kpi"><div class="label">MSTR 相對 BTC</div><div class="num ${a.decomposition.mstr_minus_btc_1d<0?'high':'low'}">${pct(a.decomposition.mstr_minus_btc_1d)}</div><div class="read">1 日相對表現</div></div>
 <div class="card kpi"><div class="label">普通股安全邊際變化</div><div class="num ${a.decomposition.m1_delta_1d<0?'high':'low'}">${num(a.decomposition.m1_delta_1d,3)}x</div><div class="read">普通股真實安全邊際的日變化</div></div>`;
 document.getElementById('logic').innerHTML='<tr><th>檢查</th><th>狀態</th><th>解讀</th></tr>'+[
  ['audit_status', audit.status||'not_run', audit.plain_english||'Logic audit not attached'],
  ['failed_invariants', audit.failed_invariants??'?', '任何綠燈前，硬規則失敗數必須是 0'],
  ['contradictions', audit.contradictions??'?', '頁面結論不能和資料互相矛盾']
 ].map(r=>`<tr><td>${r[0]}</td><td class="${cls(r[1])}">${r[1]}</td><td>${r[2]}</td></tr>`).join('');
 document.getElementById('blocked').innerHTML='<tr><th>禁止動作</th><th>為什麼重要</th></tr>'+(audit.blocked_actions||[]).map(x=>`<tr><td class="high">${actionLabel(x)}</td><td>避免假綠燈進入槓桿或過度樂觀結論</td></tr>`).join('');
 document.getElementById('drivers').innerHTML='<tr><th>驅動因素</th><th>數值</th><th>解讀</th></tr>'+a.decomposition.drivers.map(d=>`<tr><td>${d.driver}</td><td>${pct(d.value)}</td><td>${d.read}</td></tr>`).join('');
 document.getElementById('sensitivity').innerHTML='<tr><th>BTC 情境</th><th>BTC 價格</th><th>當前 MSTR 股價下的普通股安全邊際</th></tr>'+a.sensitivity.scenarios.map(s=>`<tr><td>${pct(s.btc_shock)}</td><td>$${Math.round(s.btc_price).toLocaleString()}</td><td>${num(s.equity_mnav_at_current_mstr)}x</td></tr>`).join('');
 document.getElementById('risk').innerHTML='<tr><th>風險</th><th>嚴重度</th><th>數值</th><th>解讀</th></tr>'+a.risk_stack.map(r=>`<tr><td>${r.name}</td><td class="${r.severity}">${r.severity}</td><td>${r.value}</td><td>${r.read}</td></tr>`).join('');
 const thresholdRows=(logic?.thresholds||[]).map(t=>`<tr><td>${t.metric}</td><td>${t.current}</td><td>${t.threshold}</td><td>${t.action}</td></tr>`).join('');
 const falsifyRows=(logic?.falsification_watch||[]).map(f=>`<tr><td>${f.hypothesis}</td><td colspan="3">反證條件：${f.what_would_disprove}</td></tr>`).join('');
 document.getElementById('thresholds').innerHTML='<tr><th>指標／假說</th><th>今日數值</th><th>門檻</th><th>動作／如何反證</th></tr>'+thresholdRows+falsifyRows;
}
load().catch(e=>{document.getElementById('top').innerHTML=`<div class="card full">Load failed: ${e.message}</div>`});
</script>
</body></html>
