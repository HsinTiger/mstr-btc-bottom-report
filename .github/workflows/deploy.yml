name: Deploy dashboard + Quartz wiki to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: ["Daily verified data pipeline", "Hourly cross-asset market universe", "Daily resilient AI intelligence"]
    types: [completed]

permissions:
  contents: read

# 強制 JS actions 跑 Node 24，消除 Node 20 淘汰警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Audit product surfaces before fail-closed deploy
        run: python scripts/audit_product_surfaces.py --allow-fail-closed-data

      - name: Install pinned browser smoke dependency
        run: python -m pip install -r requirements-smoke.txt

      - name: Render desktop and mobile smoke tests
        run: python scripts/smoke_product_surfaces.py

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Clone Quartz v4
        run: |
          git clone --filter=blob:none https://github.com/jackyzha0/quartz.git quartz-tmp
          git -C quartz-tmp checkout --detach d25a6eabf96751ffca56f8a8139272def7a65041

      - name: Install Quartz
        working-directory: quartz-tmp
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Inject our wiki content
        run: |
          rm -rf quartz-tmp/content
          mkdir -p quartz-tmp/content
          cp -R wiki/. quartz-tmp/content/
          # schema/manifest 不需當頁面（原檔仍留在 repo/wiki/）
          rm -f quartz-tmp/content/CLAUDE.md quartz-tmp/content/manifest.json

      - name: Configure Quartz (title + subpath baseUrl)
        run: |
          cd quartz-tmp
          perl -0pi -e 's/pageTitle:\s*"[^"]*"/pageTitle: "幣圈投資 Wiki"/' quartz.config.ts
          perl -0pi -e 's|baseUrl:\s*"[^"]*"|baseUrl: "hsintiger.github.io/mstr-btc-bottom-report/kb"|' quartz.config.ts

      - name: Build Quartz
        run: cd quartz-tmp && npx quartz build

      - name: Assemble site (dashboard at root + Quartz at /kb)
        run: |
          mkdir -p _site
          rsync -a --exclude '.git' --exclude 'quartz-tmp' --exclude '_site' --exclude 'node_modules' ./ _site/
          rm -rf _site/kb
          mkdir -p _site/kb
          cp -R quartz-tmp/public/. _site/kb/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
