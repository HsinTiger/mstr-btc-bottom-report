name: 4-hour cross-asset market universe

on:
  schedule:
    - cron: "17 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: governed-data-writer
  cancel-in-progress: false

jobs:
  update-market-universe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Test source failover contracts
        run: python scripts/test_source_failover.py

      - name: Collect market universe
        run: python scripts/collect_market_universe.py

      - name: Validate fail-closed market artifact
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          path = Path("data/daily/market_universe.json")
          data = json.loads(path.read_text(encoding="utf-8-sig"))
          if data.get("date") != datetime.now(timezone.utc).date().isoformat():
              raise SystemExit("Market-universe date does not match current UTC date")
          generated_at = datetime.fromisoformat(data["generated_at"].replace("Z", "+00:00"))
          if (datetime.now(timezone.utc) - generated_at).total_seconds() > 900:
              raise SystemExit("Market-universe artifact is not from this run")
          quality = data.get("quality", {})
          if quality.get("status") not in {"pass", "degraded", "fail"}:
              raise SystemExit("Market-universe quality status is invalid")
          checks = quality.get("checks")
          summary = quality.get("validation_summary", {})
          if not isinstance(checks, list) or not checks or not isinstance(quality.get("source_incidents"), list):
              raise SystemExit("Market-universe field-level reliability contract is missing")
          expected_counts = {
              "total": len(checks),
              "passed": sum(item.get("status") == "pass" for item in checks),
              "degraded": sum(item.get("status") == "degraded" for item in checks),
              "failed": sum(item.get("status") == "fail" for item in checks),
          }
          if any(summary.get(key) != value for key, value in expected_counts.items()):
              raise SystemExit("Market-universe validation summary does not match field checks")
          if quality.get("status") != "fail" and any(item.get("core") and item.get("status") != "pass" for item in checks):
              raise SystemExit("A core market field failed without fail-closed status")
          required = {"BTC", "ETH", "HYPE", "SOL", "BNB", "XRP", "DOGE"}
          if not required.issubset(data.get("assets", {})) and data.get("quality", {}).get("status") != "fail":
              raise SystemExit("Tracked asset universe is incomplete")
          if data.get("quality", {}).get("status") != "fail" and any(data["assets"][symbol].get("source_count", 0) < 2 for symbol in required):
              raise SystemExit("At least one tracked asset lacks two spot sources")
          thesis_quality = data.get("btc_thesis", {}).get("quality", {})
          if thesis_quality.get("status") not in {"pass", "degraded", "fail"}:
              raise SystemExit("BTC structural-context quality status is invalid")
          if thesis_quality.get("execution_gate_eligible") is not False:
              raise SystemExit("BTC structural context must never control execution gates")
          if thesis_quality.get("scope") != "structural_context_only":
              raise SystemExit("BTC structural-context scope is invalid")
          print(
              f"Market universe valid: quality={quality['status']} "
              f"core={summary.get('core_passed')}/{summary.get('core_total')} "
              f"source_incidents={summary.get('source_incident_count')} sources={len(data.get('sources', []))}"
          )
          PY

      - name: Audit product surfaces and publish fail-closed diagnostics
        run: python scripts/audit_product_surfaces.py --allow-fail-closed-data

      - name: Commit market data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/daily/market_universe.json data/daily/market_universe_history.json data/daily/site_health.json
          if git diff --cached --quiet; then
            echo "No market-universe changes to commit."
          else
            git commit -m "Update cross-asset market universe"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
