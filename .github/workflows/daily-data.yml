name: Daily verified data pipeline

on:
  schedule:
    - cron: "5 0 * * *" # 08:05 Asia/Taipei, 00:05 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: governed-data-writer
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repo
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Collect daily data
        env:
          SEC_USER_AGENT: "mstr-btc-bottom-report/1.0 hsin73@realtek.com"
        run: python scripts/daily_data_pipeline.py

      - name: Collect cross-asset market universe
        run: python scripts/collect_market_universe.py

      - name: Verify with independent data agent
        continue-on-error: true
        run: |
          rm -f data/daily/agent_verification_report.json
          python scripts/verify_daily_data.py

      - name: Enforce verifier artifact freshness
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          snapshot = json.loads(Path("data/daily/latest_snapshot.json").read_text(encoding="utf-8-sig"))
          report = json.loads(Path("data/daily/agent_verification_report.json").read_text(encoding="utf-8-sig"))
          if report.get("date") != snapshot.get("date"):
              raise SystemExit("Verifier report is missing or stale for the current snapshot")
          if report.get("snapshot_generated_at") != snapshot.get("generated_at"):
              raise SystemExit("Verifier report is not bound to the current snapshot")
          if report.get("status") not in {"pass", "degraded", "fail"}:
              raise SystemExit("Verifier report has an unknown status")
          print(f"Verifier artifact current: {report['date']} status={report['status']}")
          PY

      - name: Compile guarded Wiki context
        run: python scripts/build_knowledge_context.py

      - name: Generate institutional analytics
        run: python scripts/generate_institutional_analytics.py

      - name: Audit decision logic
        run: python scripts/audit_decision_logic.py

      - name: Attach logic audit to analytics
        run: python scripts/generate_institutional_analytics.py

      - name: Validate fail-closed decision publication
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          analytics = json.loads(Path("data/daily/institutional_analytics.json").read_text(encoding="utf-8-sig"))
          audit = json.loads(Path("data/daily/logic_audit.json").read_text(encoding="utf-8-sig"))
          context = json.loads(Path("data/daily/knowledge_context.json").read_text(encoding="utf-8-sig"))
          required_page_keys = {"slug", "title", "confidence", "last_verified", "quality_flags", "analysis_use", "decision_inputs"}
          if any(not required_page_keys.issubset(page) for page in context.get("pages", [])):
              raise SystemExit("Knowledge context contract is incomplete")
          summary = analytics.get("decision_brief", {}).get("summary_cards", [])
          action = next((item for item in summary if item.get("id") == "today_action"), {})
          if audit.get("status") != "consistent" and (action.get("tone") != "bad" or "封鎖" not in action.get("plain_read", "")):
              raise SystemExit("Unsafe publication: logic audit failed without a fail-closed action card")
          print(f"Safe publication validated: logic={audit.get('status')} knowledge_pages={len(context.get('pages', []))}")
          PY

      - name: Generate knowledge-backed daily extensions
        run: python scripts/generate_daily_extensions.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/daily/*.json
          if git diff --cached --quiet; then
            echo "No daily data changes to commit."
          else
            git commit -m "Update verified daily data"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
