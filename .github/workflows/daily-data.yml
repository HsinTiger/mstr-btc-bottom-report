name: Daily verified data pipeline

on:
  schedule:
    - cron: "5 0 * * *" # 08:05 Asia/Taipei, 00:05 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-verified-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect daily data
        env:
          SEC_USER_AGENT: "mstr-btc-bottom-report/1.0 hsin73@realtek.com"
        run: python scripts/daily_data_pipeline.py

      - name: Verify with independent data agent
        run: python scripts/verify_daily_data.py

      - name: Generate daily extensions
        run: python scripts/generate_daily_extensions.py

      - name: Generate institutional analytics
        run: python scripts/generate_institutional_analytics.py

      - name: Audit decision logic
        run: python scripts/audit_decision_logic.py

      - name: Attach logic audit to analytics
        run: python scripts/generate_institutional_analytics.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/daily/*.json
          if git diff --cached --quiet; then
            echo "No daily data changes to commit."
          else
            git commit -m "Update verified daily data"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
