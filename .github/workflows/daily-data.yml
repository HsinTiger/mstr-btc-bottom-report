name: Daily verified data pipeline

on:
  schedule:
    - cron: "5 0 * * *" # 08:05 Asia/Taipei, 00:05 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: governed-data-writer
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repo
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Collect daily data
        env:
          SEC_USER_AGENT: "mstr-btc-bottom-report/1.0 hsin73@realtek.com"
        run: python scripts/daily_data_pipeline.py

      - name: Collect cross-asset market universe
        run: python scripts/collect_market_universe.py

      - name: Verify with independent data agent
        continue-on-error: true
        run: |
          rm -f data/daily/agent_verification_report.json
          python scripts/verify_daily_data.py

      - name: Enforce verifier artifact freshness
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          snapshot = json.loads(Path("data/daily/latest_snapshot.json").read_text(encoding="utf-8-sig"))
          report = json.loads(Path("data/daily/agent_verification_report.json").read_text(encoding="utf-8-sig"))
          if report.get("date") != snapshot.get("date"):
              raise SystemExit("Verifier report is missing or stale for the current snapshot")
          if report.get("snapshot_generated_at") != snapshot.get("generated_at"):
              raise SystemExit("Verifier report is not bound to the current snapshot")
          if report.get("status") not in {"pass", "degraded", "fail"}:
              raise SystemExit("Verifier report has an unknown status")
          if report.get("status_scope") != "execution_and_decision_inputs_only":
              raise SystemExit("Verifier main status scope is invalid")
          structural = report.get("structural_context_quality", {})
          if structural.get("status") not in {"pass", "degraded", "fail"}:
              raise SystemExit("Structural-context verification is missing")
          if structural.get("execution_gate_eligible") is not False:
              raise SystemExit("Structural context must never control execution gates")
          if structural.get("scope") != "structural_context_only":
              raise SystemExit("Structural-context scope is invalid")
          print(f"Verifier artifact current: {report['date']} status={report['status']}")
          PY

      - name: Compile guarded Wiki context
        run: python scripts/build_knowledge_context.py

      - name: Generate institutional analytics
        run: python scripts/generate_institutional_analytics.py

      - name: Audit decision logic
        run: python scripts/audit_decision_logic.py

      - name: Attach logic audit to analytics
        run: python scripts/generate_institutional_analytics.py

      - name: Validate fail-closed decision publication
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          analytics = json.loads(Path("data/daily/institutional_analytics.json").read_text(encoding="utf-8-sig"))
          audit = json.loads(Path("data/daily/logic_audit.json").read_text(encoding="utf-8-sig"))
          context = json.loads(Path("data/daily/knowledge_context.json").read_text(encoding="utf-8-sig"))
          snapshot = json.loads(Path("data/daily/latest_snapshot.json").read_text(encoding="utf-8-sig"))
          verification = json.loads(Path("data/daily/agent_verification_report.json").read_text(encoding="utf-8-sig"))
          lineage = snapshot.get("generated_at")
          if not lineage or analytics.get("snapshot_generated_at") != lineage or audit.get("snapshot_generated_at") != lineage:
              raise SystemExit("Derived analytics are not bound to the current snapshot")
          required_page_keys = {"slug", "title", "confidence", "last_verified", "quality_flags", "analysis_use", "decision_inputs"}
          if any(not required_page_keys.issubset(page) for page in context.get("pages", [])):
              raise SystemExit("Knowledge context contract is incomplete")
          summary = analytics.get("decision_brief", {}).get("summary_cards", [])
          action = next((item for item in summary if item.get("id") == "today_action"), {})
          publication_mode = analytics.get("quality", {}).get("publication_mode")
          verification_status = verification.get("status")
          if verification_status == "fail":
              brief = analytics.get("decision_brief", {})
              if publication_mode != "diagnostics_only" or action.get("tone") != "bad" or "封鎖" not in action.get("plain_read", ""):
                  raise SystemExit("Unsafe publication: failed verification did not switch to diagnostics-only")
              if brief.get("exclusive_signals") or brief.get("consensus_signals"):
                  raise SystemExit("Unsafe publication: failed verification still exposes decision signals")
          elif verification_status == "degraded" and publication_mode != "research_only":
              raise SystemExit("Unsafe publication: degraded verification is not research-only")
          if audit.get("status") != "consistent":
              brief = analytics.get("decision_brief", {})
              if publication_mode != "diagnostics_only" or action.get("tone") != "bad" or "封鎖" not in action.get("plain_read", ""):
                  raise SystemExit("Unsafe publication: logic audit failed without diagnostics-only publication")
              if brief.get("exclusive_signals") or brief.get("consensus_signals"):
                  raise SystemExit("Unsafe publication: failed logic audit still exposes decision signals")
          btc_model = snapshot.get("metrics", {}).get("btc_standard", {})
          model_validated = btc_model.get("model_status") == "validated" and btc_model.get("calibrated") is True
          if not model_validated and "auto_trade" not in audit.get("decision", {}).get("blocked_actions", []):
              raise SystemExit("Unsafe publication: unvalidated BTC model did not block auto_trade")
          print(f"Safe publication validated: logic={audit.get('status')} knowledge_pages={len(context.get('pages', []))}")
          PY

      - name: Generate knowledge-backed daily extensions
        run: python scripts/generate_daily_extensions.py

      - name: Audit product surfaces and publish fail-closed diagnostics
        run: python scripts/audit_product_surfaces.py --allow-fail-closed-data

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/daily/*.json
          if git diff --cached --quiet; then
            echo "No daily data changes to commit."
          else
            git commit -m "Update verified daily data"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
