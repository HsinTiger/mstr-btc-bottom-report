<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幣圈投資 LLM Wiki</title>
<style>
:root{--bg:#e7e3da;--surface:#f1eee8;--surface2:#eae6dd;--surface3:#ddd6c9;--border:#d3ccbd;--border2:#beb6a3;
--text:#44403a;--text2:#736c60;--text3:#9a9183;--ink:#34312b;--blue:#587888;--green:#6b8260;--purple:#8d7e98;--cyan:#6f968d;
--mono:ui-monospace,'SF Mono','Menlo',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;font-size:15px;}
a{color:var(--blue);text-decoration:none;} a:hover{text-decoration:underline;}
.wrap{display:grid;grid-template-columns:230px 1fr 300px;min-height:100vh;}
/* sidebar */
.side{border-right:1px solid var(--border);padding:18px 14px;position:sticky;top:0;height:100vh;overflow-y:auto;background:var(--surface);}
.side .logo{font-weight:800;font-size:1.05rem;letter-spacing:-0.02em;margin-bottom:4px;}
.side .sub{font-size:0.72rem;color:var(--text3);margin-bottom:12px;font-family:var(--mono);}
.side input{width:100%;padding:7px 10px;margin-bottom:6px;border:1px solid var(--border2);border-radius:8px;
  background:var(--surface2);color:var(--text);font-size:0.82rem;font-family:inherit;}
.side input::placeholder{color:var(--text3);} .side input:focus{outline:none;border-color:var(--blue);}
.side .grp{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.6px;color:var(--text3);margin:16px 0 6px;font-weight:700;}
.side a.nav{display:block;padding:5px 9px;border-radius:7px;color:var(--text2);font-size:0.85rem;}
.side a.nav:hover{background:var(--surface2);color:var(--text);text-decoration:none;}
.side a.nav.active{background:var(--surface3);color:var(--ink);box-shadow:inset 0 0 0 1px var(--border2);}
.side .home{display:inline-block;margin-top:18px;font-size:0.76rem;color:var(--text3);}
/* content */
.main{padding:34px 40px;max-width:760px;}
.main h1{font-size:1.7rem;font-weight:800;letter-spacing:-0.03em;margin:0 0 6px;}
.crumb{font-size:0.74rem;color:var(--text3);font-family:var(--mono);margin-bottom:20px;}
.md h2{font-size:1.2rem;margin:22px 0 8px;letter-spacing:-0.01em;border-bottom:1px solid var(--border);padding-bottom:5px;}
.md h3{font-size:1.02rem;margin:18px 0 6px;color:var(--text);}
.md p{margin:9px 0;color:var(--text2);}
.md ul{margin:8px 0 8px 20px;color:var(--text2);} .md li{margin:3px 0;}
.md table{width:100%;border-collapse:collapse;margin:12px 0;font-size:0.84rem;}
.md th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border2);color:var(--text3);font-size:0.7rem;text-transform:uppercase;letter-spacing:0.5px;}
.md td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:top;}
.md code{font-family:var(--mono);font-size:0.82rem;background:var(--surface3);color:var(--blue);padding:2px 6px;border-radius:5px;}
.md strong,.md b{color:var(--ink);font-weight:650;}
.md a.wl{color:var(--purple);border-bottom:1px dashed rgba(183,140,247,0.4);} .md a.wl:hover{text-decoration:none;border-bottom-style:solid;}
/* right */
.right{border-left:1px solid var(--border);padding:18px 16px;position:sticky;top:0;height:100vh;overflow-y:auto;background:var(--surface);}
.right .ttl{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.6px;color:var(--text3);font-weight:700;margin:0 0 8px;}
#graph{width:100%;height:268px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;}
#graph circle{cursor:pointer;transition:r .15s;} #graph circle:hover{r:7;}
#graph text{font-size:8px;fill:var(--text2);font-family:var(--mono);pointer-events:none;}
.bl{margin-top:18px;} .bl a{display:block;font-size:0.82rem;padding:4px 0;color:var(--text2);} .bl a:hover{color:var(--blue);}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;font-size:0.68rem;color:var(--text3);}
.legend span{display:flex;align-items:center;gap:4px;} .legend i{width:8px;height:8px;border-radius:50%;display:inline-block;}
.note{padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text3);font-size:0.8rem;}
/* mobile top bar (hidden on desktop) */
.topbar{display:none;position:sticky;top:0;z-index:150;align-items:center;gap:12px;padding:11px 16px;background:rgba(241,238,232,0.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);}
.topbar .burger{font-size:1.3rem;background:none;border:none;color:var(--text);cursor:pointer;line-height:1;min-width:44px;min-height:44px;display:inline-flex;align-items:center;justify-content:center;border-radius:10px;}
.topbar .tt{font-weight:800;font-size:1rem;letter-spacing:-0.02em;}
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:140;}
@media(max-width:900px){
  .topbar{display:flex;}
  .wrap{display:block;}
  .side{position:fixed;top:0;left:0;height:100vh;width:80%;max-width:300px;z-index:200;
    transform:translateX(-100%);transition:transform .25s ease;border-right:1px solid var(--border2);}
  .side.open{transform:translateX(0);}
  .backdrop.show{display:block;}
  .main{padding:20px 18px;max-width:none;}
  .main h1{font-size:1.4rem;}
  .right{position:static;height:auto;border-left:none;border-top:1px solid var(--border);}
  #graph{height:300px;}
  .md table{display:block;overflow-x:auto;max-width:100%;-webkit-overflow-scrolling:touch;font-size:0.78rem;}
  .md h1{font-size:1.4rem;} .md h2{font-size:1.05rem;}
}
</style>
</head>
<body>
<div class="topbar">
  <button class="burger" id="burger" aria-label="選單">☰</button>
  <span class="tt">📚 投資 Wiki</span>
</div>
<div class="backdrop" id="backdrop"></div>
<div class="wrap">
  <nav class="side" id="side">
    <div class="logo">📚 幣圈投資 Wiki</div>
    <div class="sub">Karpathy LLM-Wiki 模式</div>
    <input id="search" placeholder="🔍 搜尋頁面…" autocomplete="off">
    <div id="nav"></div>
    <a class="home" href="index.html">← 回決策儀表</a>
  </nav>
  <main class="main">
    <h1 id="pgTitle">載入中…</h1>
    <div class="crumb" id="pgCrumb"></div>
    <div class="md" id="pgBody"><div class="note">載入 Wiki 中…（須由 GitHub Pages 線上開啟才能讀 wiki/ 檔案）</div></div>
  </main>
  <aside class="right">
    <div class="ttl">關係圖 Graph</div>
    <svg id="graph" viewBox="0 0 300 268"></svg>
    <div class="legend">
      <span><i style="background:var(--blue)"></i>總述</span><span><i style="background:var(--purple)"></i>概念</span>
      <span><i style="background:var(--green)"></i>標的</span><span><i style="background:var(--cyan)"></i>來源</span>
      <span><i style="background:var(--text3)"></i>維護</span>
    </div>
    <div class="bl"><div class="ttl">反向連結 Backlinks</div><div id="backlinks"></div></div>
  </aside>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
// mobile drawer toggle
const side=document.getElementById('side'), backdrop=document.getElementById('backdrop');
function toggleSide(open){ side.classList.toggle('open',open); backdrop.classList.toggle('show',open); }
document.getElementById('burger').onclick=()=>toggleSide(!side.classList.contains('open'));
backdrop.onclick=()=>toggleSide(false);
// sidebar search filter
document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase();
  document.querySelectorAll('.side a.nav').forEach(a=>{a.style.display=a.textContent.toLowerCase().includes(q)?'':'none';});
  document.querySelectorAll('.side .grp').forEach(g=>{let n=g.nextElementSibling,any=false;
    while(n&&n.classList&&n.classList.contains('nav')){if(n.style.display!=='none')any=true;n=n.nextElementSibling;}
    g.style.display=any?'':'none';});
});

const GCOL={'總述':'#587888','概念':'#8d7e98','標的':'#6b8260','來源':'#6f968d','維護':'#9a9183'};
let PAGES={}, MAN=[], EDGES=[];
const slugRe=/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g;

fetch('wiki/manifest.json',{cache:'no-store'}).then(r=>r.json()).then(async m=>{
  MAN=m.pages;
  await Promise.all(MAN.map(async p=>{
    try{ const t=await (await fetch('wiki/'+p.path,{cache:'no-store'})).text();
      const links=[...t.matchAll(slugRe)].map(x=>x[1]).filter(s=>MAN.some(q=>q.slug===s));
      PAGES[p.slug]={...p,text:t,links:[...new Set(links)]};
    }catch(e){ PAGES[p.slug]={...p,text:'(讀取失敗)',links:[]}; }
  }));
  // edges
  const seen=new Set();
  Object.values(PAGES).forEach(p=>p.links.forEach(t=>{const k=[p.slug,t].sort().join('|'); if(!seen.has(k)){seen.add(k);EDGES.push({s:p.slug,t});}}));
  buildNav(); buildGraph();
  window.addEventListener('hashchange',()=>{const s=decodeURIComponent(location.hash.replace('#',''));if(PAGES[s])load(s);});
  const start=decodeURIComponent(location.hash.replace('#',''))||'overview';
  load(PAGES[start]?start:'overview');
}).catch(e=>{ document.getElementById('pgBody').innerHTML='<div class="note">無法載入 wiki/manifest.json — 請在 GitHub Pages 線上開啟（本機 file:// 會被瀏覽器擋）。</div>'; });

function buildNav(){
  const groups={}; MAN.forEach(p=>{(groups[p.group]=groups[p.group]||[]).push(p);});
  let h=''; Object.keys(groups).forEach(g=>{ h+=`<div class="grp">${g}</div>`;
    groups[g].forEach(p=>h+=`<a class="nav" data-slug="${p.slug}" href="#${p.slug}">${p.title}</a>`); });
  document.getElementById('nav').innerHTML=h;
}

function buildGraph(){
  const W=300,H=268,nodes=MAN.map(p=>({slug:p.slug,title:p.title,group:p.group}));
  const idx={}; nodes.forEach((n,i)=>idx[n.slug]=i);
  nodes.forEach(n=>{n.x=40+Math.random()*(W-80);n.y=40+Math.random()*(H-80);n.vx=0;n.vy=0;});
  for(let it=0;it<320;it++){
    for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
      let dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y,d2=dx*dx+dy*dy+0.01,d=Math.sqrt(d2),f=900/d2;
      nodes[i].vx+=f*dx/d;nodes[i].vy+=f*dy/d;nodes[j].vx-=f*dx/d;nodes[j].vy-=f*dy/d;}
    EDGES.forEach(e=>{let a=nodes[idx[e.s]],b=nodes[idx[e.t]];if(!a||!b)return;
      let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)+0.01,f=(d-58)*0.03;
      a.vx+=f*dx/d;a.vy+=f*dy/d;b.vx-=f*dx/d;b.vy-=f*dy/d;});
    nodes.forEach(n=>{n.vx+=(W/2-n.x)*0.006;n.vy+=(H/2-n.y)*0.006;
      n.x+=Math.max(-7,Math.min(7,n.vx));n.y+=Math.max(-7,Math.min(7,n.vy));n.vx*=0.85;n.vy*=0.85;
      n.x=Math.max(14,Math.min(W-14,n.x));n.y=Math.max(14,Math.min(H-14,n.y));});
  }
  let g=''; EDGES.forEach(e=>{let a=nodes[idx[e.s]],b=nodes[idx[e.t]];if(a&&b)g+=`<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="#c8c0b0" stroke-width="1"/>`;});
  nodes.forEach(n=>{g+=`<circle data-slug="${n.slug}" cx="${n.x}" cy="${n.y}" r="5" fill="${GCOL[n.group]||'#6a6a6a'}"/>`;
    g+=`<text x="${n.x}" y="${n.y-8}" text-anchor="middle">${n.title.slice(0,6)}</text>`;});
  document.getElementById('graph').innerHTML=g; window._nodes=nodes;
  document.querySelectorAll('#graph circle').forEach(c=>c.onclick=()=>{location.hash=c.dataset.slug;});
}

function load(slug){
  const p=PAGES[slug]; if(!p)return; location.hash=slug;
  let t=p.text.replace(/^---\n[\s\S]*?\n---\n/,'');               // strip frontmatter
  t=t.replace(/^\s*#\s+.+\n/,'');                                  // strip duplicate H1 (pgTitle 已顯示)
  t=t.replace(slugRe,(m,s,al)=>{const tg=PAGES[s];const lbl=al||(tg?tg.title:s);return `<a class="wl" data-slug="${s}">${lbl}</a>`;});
  document.getElementById('pgTitle').textContent=p.title;
  document.getElementById('pgCrumb').textContent=p.group+' / '+p.path;
  const body=document.getElementById('pgBody');
  body.innerHTML=(window.marked?marked.parse(t):('<pre>'+t+'</pre>'));
  body.querySelectorAll('a.wl').forEach(a=>a.onclick=e=>{e.preventDefault();location.hash=a.dataset.slug;});
  document.querySelectorAll('.side a.nav').forEach(a=>a.classList.toggle('active',a.dataset.slug===slug));
  document.querySelectorAll('#graph circle').forEach(c=>c.setAttribute('r',c.dataset.slug===slug?'7.5':'5'));
  // backlinks
  const back=Object.values(PAGES).filter(q=>q.links.includes(slug));
  document.getElementById('backlinks').innerHTML = back.length? back.map(q=>`<a data-slug="${q.slug}">← ${q.title}</a>`).join('') : '<div style="font-size:0.78rem;color:var(--text3)">（無）</div>';
  document.querySelectorAll('#backlinks a').forEach(a=>a.onclick=e=>{e.preventDefault();location.hash=a.dataset.slug;});
  toggleSide(false);
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
