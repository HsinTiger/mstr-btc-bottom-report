<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="app-section" content="site-governance">
<meta name="app-purpose" content="統籌每個專區的任務、資料責任、更新狀態與生命週期">
<meta name="app-update" content="每 4 小時與每日">
<link rel="icon" href="data:,">
<title>專區總覽｜產品 CEO 治理台</title>
<style>
:root{--bg:#e8e4dc;--card:#f5f2ec;--soft:#ede8df;--line:#c8beaf;--ink:#302e29;--text:#514c44;--muted:#70685e;--red:#8f493e;--green:#4f6c48;--yellow:#745b1f;--blue:#365f70;--mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;line-height:1.55}.wrap{width:min(1120px,calc(100% - 28px));margin:auto;padding:22px 0 60px}.hero,.section{background:var(--card);border:1px solid var(--line);border-radius:17px}.hero,.section{padding:24px}.section{margin-top:14px}.hero h1,.section h2{margin:0}.hero p,.section p{color:var(--text)}a{color:var(--blue);text-decoration:none}.nav{display:flex;gap:14px;flex-wrap:wrap;margin-top:14px;font-weight:800;font-size:.8rem}.status{margin-top:14px;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:var(--soft);font:750 .79rem/1.5 var(--mono)}.status.fail{color:var(--red);background:#f1dfdb}.status.degraded{color:var(--yellow);background:#f1e8cf}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.card{padding:17px;border:1px solid var(--line);border-radius:14px;background:var(--soft)}.top{display:flex;justify-content:space-between;gap:12px}.card h3{margin:0;font-size:1.05rem}.badge{height:max-content;padding:4px 8px;border:1px solid var(--line);border-radius:999px;font-size:.68rem;font-weight:900}.badge.pass{color:var(--green)}.badge.degraded{color:var(--yellow)}.badge.fail{color:var(--red)}.question{margin:10px 0;font-size:.9rem;font-weight:800}.meta,.detail{color:var(--muted);font-size:.75rem}.detail{margin-top:9px}.go{display:inline-flex;min-height:42px;align-items:center;margin-top:12px;font-size:.8rem;font-weight:900}.archive .card{opacity:.82}.rules{margin:0;padding-left:20px;color:var(--text)}@media(max-width:720px){.wrap{width:calc(100% - 18px);padding-top:9px}.hero,.section{padding:16px;border-radius:12px}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="wrap">
<header class="hero"><h1>專區總覽｜產品 CEO 治理台</h1><p><b>本專區回答：</b>每個專區有何用途、現在是否健康、何時該打開，以及該保留、重整或封存？</p><nav class="nav" aria-label="全站主要專區"><a href="index.html">今日決策</a><a href="market-monitor.html">市場雷達</a><a href="x-intelligence.html">AI 情報</a><a href="analytics.html">專業分析</a><a href="dashboard.html">策略研究室</a><a href="daily-extensions.html">每日延伸</a><a href="wiki.html">知識庫</a><a href="site-overview.html">專區總覽</a></nav><div class="status" id="status">載入全站健康狀態…</div></header>
<section class="section"><h2>目前維護的專區</h2><p>每個專區只負責一個核心問題。若資料過期或契約失敗，狀態會在這裡直接揭露。</p><div class="grid" id="active"></div></section>
<section class="section archive"><h2>封存專區</h2><p>保留歷史決策脈絡，但不再代表目前投資體系，也不出現在主要導航。</p><div class="grid" id="archive"></div></section>
<section class="section"><h2>CEO 維護規則</h2><ul class="rules" id="rules"></ul></section>
</main>
<script>
const esc=value=>String(value??"").replace(/[&<>"']/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[char]);
async function json(path){const response=await fetch(path,{cache:"no-store"});if(!response.ok)throw new Error(`${path} HTTP ${response.status}`);return response.json()}
function card(page){const dependencyIssues=(page.dependencies||[]).filter(item=>item.status!=="pass");const issue=(page.checks||[]).filter(item=>item.status!=="pass").map(item=>item.reason).filter(Boolean).concat(dependencyIssues.map(item=>`${item.path}：${item.reason}`));return `<article class="card"><div class="top"><h3>${esc(page.title)}</h3><span class="badge ${esc(page.status)}">${esc(page.status).toUpperCase()}</span></div><div class="question">${esc(page.user_question)}</div><div>${esc(page.role)}</div><div class="detail"><b>何時打開：</b>${esc(page.open_when)}</div><div class="meta">頁面程式 ${esc(page.surface_status||page.status)}｜決策資料 ${esc(page.data_status||page.status)}｜更新 ${esc(page.cadence)}｜CEO 決策 ${esc(page.owner_action)}${page.research_as_of?`｜研究樣本 ${esc(page.research_as_of)}`:""}</div>${issue.length?`<div class="detail"><b>待處理：</b>${esc(issue.slice(0,2).join("；"))}</div>`:""}<a class="go" href="${esc(page.path)}">進入專區 →</a></article>`}
async function render(){const[registry,health]=await Promise.all([json("data/site_registry.json"),json("data/daily/site_health.json")]);if(registry.schema!==1||health.schema!==1)throw new Error("治理資料 schema 不相容");const status=document.getElementById("status");status.className=`status ${health.status}`;status.textContent=`全站 ${health.status.toUpperCase()}｜維護中 ${health.summary.active_pages}｜通過 ${health.summary.pass}｜降級 ${health.summary.degraded}｜失敗 ${health.summary.fail}｜稽核 ${new Date(health.generated_at).toLocaleString("zh-TW",{timeZone:"Asia/Taipei",hour12:false})}`;document.getElementById("active").innerHTML=health.pages.filter(page=>page.lifecycle==="active").map(card).join("");document.getElementById("archive").innerHTML=health.pages.filter(page=>page.lifecycle==="archive").map(card).join("");document.getElementById("rules").innerHTML=(health.governance_rules||[]).map(rule=>`<li>${esc(rule)}</li>`).join("")}
render().catch(error=>{const status=document.getElementById("status");status.className="status fail";status.textContent=`治理資料失敗：${error.message}`});
</script>
</body>
</html>
